name: Build and Typecheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install pnpm via Corepack
      run: corepack enable && corepack prepare pnpm@latest --activate

    - name: Install dependencies
      run: pnpm install

    - name: Typecheck
      run: pnpm run typecheck

    - name: Build
      run: pnpm run build

  firmware:
    name: ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache PlatformIO
      id: cache-pio
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          firmware/.pio
        key: pio-${{ hashFiles('firmware/platformio.ini') }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install platformio

    - name: Build firmware
      run: pio run
      working-directory: firmware

    - name: Archive firmware binary
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware
        path: firmware/.pio/build/esp32dev/firmware.bin
        retention-days: 30
