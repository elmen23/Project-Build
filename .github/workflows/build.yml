name: Build and Typecheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install pnpm v9
      run: npm install -g pnpm@9

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Typecheck
      run: pnpm run typecheck

    - name: Build
      run: pnpm run build
      env:
        PORT: 5173
        BASE_PATH: /

  firmware:
    name: ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache PlatformIO
      id: cache-pio
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          firmware/.pio
        key: pio-${{ hashFiles('firmware/platformio.ini') }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install platformio esptool

    - name: Build firmware
      run: pio run
      working-directory: firmware

    - name: Create merged flash binary
      run: |
        esptool.py --chip esp32 merge_bin \
          -o merged-flash.bin \
          --flash_mode dio \
          --flash_freq 80m \
          --flash_size 4MB \
          0x1000 .pio/build/esp32dev/bootloader.bin \
          0x8000 .pio/build/esp32dev/partitions.bin \
          0x10000 .pio/build/esp32dev/firmware.bin
      working-directory: firmware

    - name: Archive firmware binaries
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware
        path: |
          firmware/.pio/build/esp32dev/firmware.bin
          firmware/.pio/build/esp32dev/merged-flash.bin
        retention-days: 30
